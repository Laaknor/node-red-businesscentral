<script type="text/javascript">
  (function () {
    function toOptions(items) {
      return (items || []).map(function (item) {
        return '<option value="' + item.id + '">' + (item.name || item.id) + "</option>";
      }).join("");
    }

    function toCompanyOptions(items) {
      return (items || []).map(function (item) {
        var label = item.name || item.id;
        return '<option value="' + item.id + '" data-company-name="' + label + '">' + label + "</option>";
      }).join("");
    }

    function buildEndpointOptions(items, searchTerm) {
      var grouped = {};
      var loweredSearch = (searchTerm || "").toLowerCase();
      (items || []).forEach(function (item) {
        var label = item.name || item.id;
        var groupLabel = item.groupLabel || "other";
        var haystack = (label + " " + groupLabel).toLowerCase();
        if (loweredSearch && haystack.indexOf(loweredSearch) === -1) return;
        if (!grouped[groupLabel]) grouped[groupLabel] = [];
        grouped[groupLabel].push(item);
      });
      var html = "";
      Object.keys(grouped).sort().forEach(function (groupLabel) {
        html += '<optgroup label="' + groupLabel + '">';
        grouped[groupLabel].forEach(function (item) {
          var entitySet = item.entitySet || "";
          var metadataPath = item.metadataPath || "";
          html += '<option value="' + item.id + '" data-entity-set="' + entitySet + '" data-metadata-path="' + metadataPath + '">' + (item.name || item.id) + "</option>";
        });
        html += "</optgroup>";
      });
      return html;
    }

    function fetchJson(url) {
      return $.ajax({
        url: url,
        method: "GET",
        dataType: "json"
      }).catch(function (jqXHR) {
        var message = "Request failed";
        if (jqXHR && jqXHR.responseJSON && jqXHR.responseJSON.error) {
          message = jqXHR.responseJSON.error;
        } else if (jqXHR && jqXHR.responseText) {
          try {
            var body = JSON.parse(jqXHR.responseText);
            message = body.error || message;
          } catch (e) {
            message = jqXHR.responseText || message;
          }
        }
        throw new Error(message);
      });
    }

    function readCredentials() {
      return {
        configNodeId: $("#node-input-bcConfig").val(),
        company: $("#node-input-company").val()
      };
    }

    function ensureSelectValue(selector, value, label) {
      if (!value) return;
      var $select = $(selector);
      if ($select.find('option[value="' + value.replace(/"/g, '\\"') + '"]').length === 0) {
        $select.append('<option value="' + value + '">' + (label || value) + "</option>");
      }
      $select.val(value);
    }

    function parseDependencyMeta(raw) {
      if (!raw) return {};
      try {
        return JSON.parse(raw);
      } catch (e) {
        return {};
      }
    }

    function normalizeSelectedFields(raw) {
      if (!raw) return [];
      if (Array.isArray(raw)) return raw;
      if (typeof raw === "string") {
        return raw.split(",").map(function (s) { return s.trim(); }).filter(Boolean);
      }
      return [];
    }

    function renderSelectedFieldsSummary(raw) {
      var values = normalizeSelectedFields(raw);
      $("#bc-selected-fields-summary").text(values.length ? values.join(", ") : "None selected");
    }

    function encodeFilterValue(value, valueType) {
      if (valueType === "number") return String(value);
      if (valueType === "boolean") return String(value).toLowerCase() === "true" ? "true" : "false";
      return "'" + String(value || "").replace(/'/g, "''") + "'";
    }

    function conditionToOData(condition) {
      var op = condition.operator || "eq";
      var field = condition.field || "";
      var val = encodeFilterValue(condition.value, condition.valueType || "string");
      if (!field) return "";
      if (op === "contains" || op === "startswith" || op === "endswith") {
        return op + "(" + field + "," + val + ")";
      }
      return field + " " + op + " " + val;
    }

    function groupToOData(group) {
      var logic = (group.logic || "and").toLowerCase();
      var parts = [];
      (group.conditions || []).forEach(function (c) {
        var expr = conditionToOData(c);
        if (expr) parts.push(expr);
      });
      (group.groups || []).forEach(function (g) {
        var sub = groupToOData(g);
        if (sub) parts.push(sub);
      });
      if (!parts.length) return "";
      if (parts.length === 1) return parts[0];
      return "(" + parts.join(" " + logic + " ") + ")";
    }

    function filterGroupsToOData(filterGroups) {
      if (!filterGroups || !Array.isArray(filterGroups.groups)) return "";
      var logic = (filterGroups.logic || "and").toLowerCase();
      var parts = filterGroups.groups.map(groupToOData).filter(Boolean);
      if (!parts.length) return "";
      if (parts.length === 1) return parts[0];
      return parts.join(" " + logic + " ");
    }

    function parseFilterGroups(raw) {
      if (!raw) return { logic: "and", groups: [{ logic: "and", conditions: [], groups: [] }] };
      try {
        var parsed = typeof raw === "string" ? JSON.parse(raw) : raw;
        if (!parsed || !Array.isArray(parsed.groups)) {
          return { logic: "and", groups: [{ logic: "and", conditions: [], groups: [] }] };
        }
        return parsed;
      } catch (e) {
        return { logic: "and", groups: [{ logic: "and", conditions: [], groups: [] }] };
      }
    }

    function operatorOptionsForType(fieldType) {
      if (fieldType === "number") {
        return ["eq", "ne", "gt", "ge", "lt", "le"];
      }
      if (fieldType === "boolean") {
        return ["eq", "ne"];
      }
      return ["eq", "ne", "contains", "startswith", "endswith", "gt", "ge", "lt", "le"];
    }

    function getFieldType(fieldCache, fieldName) {
      var match = (fieldCache || []).find(function (f) { return f.name === fieldName; });
      return match && match.type ? match.type : "string";
    }

    function getGroupByPath(root, pathStr) {
      var current = root;
      if (!pathStr) return current;
      var parts = pathStr.split("/").filter(Boolean).map(function (n) { return Number(n); });
      for (var i = 0; i < parts.length; i++) {
        current = current.groups[parts[i]];
      }
      return current;
    }

    function renderGroupHtml(group, path, fieldCache) {
      var groupLogic = group.logic || "and";
      var html = '<div class="bc-filter-group" data-path="' + path + '" style="border:1px solid #ddd;padding:8px;margin:8px 0;">';
      html += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">';
      html += '<strong>Group</strong>';
      html += '<label style="margin-left:8px;">Match</label>';
      html += '<select class="bc-group-logic"><option value="and"' + (groupLogic === "and" ? " selected" : "") + '>ALL (AND)</option><option value="or"' + (groupLogic === "or" ? " selected" : "") + '>ANY (OR)</option></select>';
      html += '<button class="red-ui-button bc-add-condition" type="button">+ Condition</button>';
      html += '<button class="red-ui-button bc-add-subgroup" type="button">+ Subgroup</button>';
      if (path) html += '<button class="red-ui-button bc-remove-group" type="button">Remove Group</button>';
      html += '</div>';

      (group.conditions || []).forEach(function (cond, idx) {
        var fType = getFieldType(fieldCache, cond.field);
        var ops = operatorOptionsForType(fType);
        html += '<div class="bc-condition-row" data-cond-index="' + idx + '" style="display:flex;gap:6px;align-items:center;margin:4px 0;">';
        if (fieldCache && fieldCache.length) {
          html += '<select class="bc-cond-field"><option value="">Field...</option>';
          (fieldCache || []).forEach(function (f) {
            html += '<option value="' + f.name + '"' + (f.name === cond.field ? " selected" : "") + ">" + f.label + "</option>";
          });
          html += "</select>";
        } else {
          html += '<input class="bc-cond-field-text" type="text" value="' + (cond.field || "") + '" placeholder="Field name" />';
        }
        html += '<select class="bc-cond-operator">';
        ops.forEach(function (op) {
          html += '<option value="' + op + '"' + (op === cond.operator ? " selected" : "") + ">" + op + "</option>";
        });
        html += "</select>";
        html += '<input class="bc-cond-value" type="text" value="' + (cond.value || "") + '" placeholder="Value" />';
        html += '<button class="red-ui-button bc-remove-condition" type="button">Remove</button>';
        html += "</div>";
      });

      (group.groups || []).forEach(function (sub, subIdx) {
        var subPath = path ? path + "/" + subIdx : String(subIdx);
        html += renderGroupHtml(sub, subPath, fieldCache);
      });

      html += "</div>";
      return html;
    }

    function updateParentUi() {
      var dependencyMeta = parseDependencyMeta($("#node-input-endpointDependencyMeta").val());
      var requiresParent = !!dependencyMeta.requiresParent;
      $(".bc-parent-row").toggle(requiresParent);
      var mode = $("#node-input-parentMode").val();
      $(".bc-parent-fixed-row").toggle(requiresParent && mode === "Single Parent" && $("#node-input-parentIdSource").val() === "fixed");
      $(".bc-parent-msg-row").toggle(requiresParent && mode === "Single Parent" && $("#node-input-parentIdSource").val() === "msg");
      $(".bc-parent-query-row").toggle(requiresParent && mode === "All Parents");
      if (requiresParent) {
        $("#bc-parent-notice").text("This endpoint requires parent context.");
      } else {
        $("#bc-parent-notice").text("");
      }
    }

    RED.nodes.registerType("businesscentral-get", {
      category: "function",
      color: "#C0DEED",
      defaults: {
        name: { value: "" },
        bcConfig: { value: "", type: "businesscentral-config", required: true },
        company: { value: "", required: true },
        companyName: { value: "" },
        endpoint: { value: "", required: true },
        endpointEntitySet: { value: "" },
        endpointMetadataPath: { value: "" },
        fetchMode: { value: "All", required: true },
        selectedFields: { value: "" },
        filterGroups: { value: "" },
        endpointDependencyMeta: { value: "" },
        parentMode: { value: "Single Parent" },
        parentIdSource: { value: "msg" },
        parentIdMsgField: { value: "salesOrderId" },
        parentIdFixed: { value: "" },
        parentQuery: { value: "" },
        maxParents: { value: 500, validate: RED.validators.number() },
        concurrencyLimit: { value: 5, validate: RED.validators.number() }
      },
      credentials: {},
      inputs: 1,
      outputs: 1,
      icon: "font-awesome/fa-database",
      label: function () {
        return this.name || "businesscentral-get";
      },
      oneditprepare: function () {
        var node = this;
        var endpointCache = [];
        var fieldCache = [];
        renderSelectedFieldsSummary(node.selectedFields);
        ensureSelectValue("#node-input-company", node.company, node.companyName || node.company);
        ensureSelectValue("#node-input-endpoint", node.endpoint, node.endpoint);
        if (node.endpointEntitySet) {
          $("#node-input-endpoint option:selected").attr("data-entity-set", node.endpointEntitySet);
        }
        if (node.endpointMetadataPath) {
          $("#node-input-endpoint option:selected").attr("data-metadata-path", node.endpointMetadataPath);
        }
        function loadCompanies() {
          var c = readCredentials();
          var url = "businesscentral/companies?configNodeId=" + encodeURIComponent(c.configNodeId);
          return fetchJson(url).then(function (items) {
            $("#node-input-company").html(toCompanyOptions(items));
            if (node.company) $("#node-input-company").val(node.company);
          });
        }

        function loadEndpoints() {
          var c = readCredentials();
          var url = "businesscentral/endpoints?configNodeId=" + encodeURIComponent(c.configNodeId)
            + "&company=" + encodeURIComponent(c.company);
          return fetchJson(url).then(function (items) {
            endpointCache = items || [];
            $("#node-input-endpoint").html(buildEndpointOptions(endpointCache, $("#node-input-endpoint-search").val()));
            if (node.endpoint) $("#node-input-endpoint").val(node.endpoint);
          });
        }

        function loadFields() {
          var c = readCredentials();
          var endpoint = $("#node-input-endpoint").val();
          var selected = $("#node-input-endpoint option:selected");
          var entitySet = selected.attr("data-entity-set") || endpoint;
          var metadataPath = selected.attr("data-metadata-path") || "/$metadata";
          var url = "businesscentral/endpoint-fields?configNodeId=" + encodeURIComponent(c.configNodeId)
            + "&company=" + encodeURIComponent(c.company)
            + "&endpoint=" + encodeURIComponent(endpoint)
            + "&entitySet=" + encodeURIComponent(entitySet)
            + "&metadataPath=" + encodeURIComponent(metadataPath);
          return fetchJson(url).then(function (items) {
            fieldCache = items || [];
            var options = (items || []).map(function (item) {
              return '<option value="' + item.name + '">' + item.label + "</option>";
            }).join("");
            $("#node-input-selectedFields").html(options);
            var existing = normalizeSelectedFields(node.selectedFields);
            $("#node-input-selectedFields").val(existing);
            renderSelectedFieldsSummary(existing);
          });
        }

        function loadDependencies() {
          var c = readCredentials();
          var selected = $("#node-input-endpoint option:selected");
          var endpoint = selected.attr("data-entity-set") || $("#node-input-endpoint").val();
          var url = "businesscentral/endpoint-dependencies?configNodeId=" + encodeURIComponent(c.configNodeId)
            + "&company=" + encodeURIComponent(c.company)
            + "&endpoint=" + encodeURIComponent(endpoint);
          return fetchJson(url).then(function (meta) {
            $("#node-input-endpointDependencyMeta").val(JSON.stringify(meta || {}));
            updateParentUi();
          });
        }

        $("#bc-load-companies").on("click", function (e) {
          e.preventDefault();
          loadCompanies().catch(function (err) { RED.notify(err.message, "error"); });
        });
        $("#bc-load-endpoints").on("click", function (e) {
          e.preventDefault();
          loadEndpoints().catch(function (err) { RED.notify(err.message, "error"); });
        });
        $("#bc-load-fields").on("click", function (e) {
          e.preventDefault();
          loadFields().catch(function (err) { RED.notify(err.message, "error"); });
        });

        $("#node-input-endpoint").on("change", function () {
          loadDependencies().catch(function () { $("#node-input-endpointDependencyMeta").val("{}"); updateParentUi(); });
        });
        $("#node-input-endpoint-search").on("input", function () {
          var selected = $("#node-input-endpoint").val();
          $("#node-input-endpoint").html(buildEndpointOptions(endpointCache, $("#node-input-endpoint-search").val()));
          if (selected) $("#node-input-endpoint").val(selected);
        });
        $("#node-input-parentMode,#node-input-parentIdSource").on("change", updateParentUi);
        updateParentUi();
      },
      oneditsave: function () {
        var selected = $("#node-input-selectedFields").val() || [];
        $("#node-input-selectedFields").val(selected);
        $("#node-input-selectedFields-hidden").val(selected.join(","));
        var selectedCompanyName = $("#node-input-company option:selected").attr("data-company-name") || "";
        $("#node-input-companyName").val(selectedCompanyName);
        var selectedEndpoint = $("#node-input-endpoint option:selected");
        $("#node-input-endpointEntitySet").val(selectedEndpoint.attr("data-entity-set") || "");
        $("#node-input-endpointMetadataPath").val(selectedEndpoint.attr("data-metadata-path") || "");
        // filterGroups hidden value is continuously synced by visual builder
      }
    });
  })();
</script>

  <div class="form-row">

      <option value="Single Parent">Single Parent</option>
      <option value="All Parents">All Parents</option>
    </select>
  </div>
  <div class="form-row bc-parent-row">
    <label for="node-input-parentIdSource">Parent id source</label>
    <select id="node-input-parentIdSource">
      <option value="msg">msg field</option>
      <option value="fixed">fixed</option>
    </select>

  </div>
  <div class="form-row bc-parent-row bc-parent-fixed-row">
    <label for="node-input-parentIdFixed">Fixed parent id</label>
    <input type="text" id="node-input-parentIdFixed" />
  </div>
  <div class="form-row bc-parent-row bc-parent-query-row">
    <label for="node-input-parentQuery">Parent query JSON</label>
    <input type="text" id="node-input-parentQuery" placeholder='{"$filter":"..."}' />
  </div>
  <div class="form-row">
    <label for="node-input-maxParents">Max parents</label>
    <input type="number" id="node-input-maxParents" />
  </div>
  <div class="form-row">
    <label for="node-input-concurrencyLimit">Concurrency</label>
    <input type="number" id="node-input-concurrencyLimit" />
  </div>
  <input type="hidden" id="node-input-endpointDependencyMeta" />
</script>

  (function () {

      var parts = [];
      (group.conditions || []).forEach(function (c) {
        var expr = conditionToOData(c);
        if (expr) parts.push(expr);
      });
      (group.groups || []).forEach(function (g) {

      }

    }

    function renderGroupHtml(group, path) {
      var groupLogic = group.logic || "and";
      var html = '<div class="bcf-group" data-path="' + path + '" style="border:1px solid #ddd;padding:8px;margin:8px 0;">';

        var model = parseFilterGroups(node.filterGroups);
        function render() {
          $("#bcf-builder").html(renderGroupHtml(model, ""));
          $("#node-input-filterGroups").val(JSON.stringify(model));
          $("#bcf-preview").text(filterGroupsToOData(model) || "(no filter)");
        }

        $("#bcf-builder").on("change", ".bcf-group-logic", function () {
          var path = $(this).closest(".bcf-group").attr("data-path") || "";
          getGroupByPath(model, path).logic = $(this).val();
          render();
        });
        $("#bcf-builder").on("click", ".bcf-add-condition", function () {
          var path = $(this).closest(".bcf-group").attr("data-path") || "";
          var g = getGroupByPath(model, path);
          g.conditions = g.conditions || [];
          g.conditions.push({ field: "", operator: "eq", value: "", valueType: "string" });
          render();
        });
        $("#bcf-builder").on("click", ".bcf-remove-condition", function () {
          var path = $(this).closest(".bcf-group").attr("data-path") || "";
          var idx = Number($(this).closest(".bcf-condition-row").attr("data-cond-index"));
          getGroupByPath(model, path).conditions.splice(idx, 1);
          render();
        });
        $("#bcf-builder").on("click", ".bcf-add-subgroup", function () {
          var path = $(this).closest(".bcf-group").attr("data-path") || "";
          var g = getGroupByPath(model, path);
          g.groups = g.groups || [];
          g.groups.push({ logic: "and", conditions: [], groups: [] });
          render();
        });
        $("#bcf-builder").on("click", ".bcf-remove-group", function () {
          var path = $(this).closest(".bcf-group").attr("data-path") || "";
          if (!path) return;
          var parts = path.split("/");
          var idx = Number(parts.pop());
          getGroupByPath(model, parts.join("/")).groups.splice(idx, 1);
          render();
        });
        $("#bcf-builder").on("input change", ".bcf-cond-field,.bcf-cond-operator,.bcf-cond-value,.bcf-cond-valuetype", function () {
          var row = $(this).closest(".bcf-condition-row");
          var idx = Number(row.attr("data-cond-index"));
          var path = $(this).closest(".bcf-group").attr("data-path") || "";
          var cond = getGroupByPath(model, path).conditions[idx];
          cond.field = row.find(".bcf-cond-field").val();
          cond.operator = row.find(".bcf-cond-operator").val();
          cond.value = row.find(".bcf-cond-value").val();
          cond.valueType = row.find(".bcf-cond-valuetype").val();
          $("#node-input-filterGroups").val(JSON.stringify(model));
          $("#bcf-preview").text(filterGroupsToOData(model) || "(no filter)");
        });
        render();
      }
    });
  })();
</script>

<script type="text/javascript">
  RED.nodes.registerType("businesscentral-config", {
    category: "config",
    defaults: {
      name: { value: "" },
      tenantId: { value: "", required: true },
      environment: { value: "", required: true },
      customApiNamespaces: { value: "[]", required: false }
    },
    credentials: {
      clientId: { type: "text", required: true },
      clientSecret: { type: "password", required: true }
    },
    oneditprepare: function () {
      var namespaces = [];
      try {
        var parsed = JSON.parse(this.customApiNamespaces || "[]");
        namespaces = Array.isArray(parsed) ? parsed : (parsed ? [parsed] : []);
      } catch (e) {
        namespaces = [];
      }

      function renderNamespaces() {
        var rows = namespaces.map(function (ns, index) {
          return (
            '<tr>' +
              '<td>' + (ns.apiPublisher || "") + '</td>' +
              '<td>' + (ns.apiGroup || "") + '</td>' +
              '<td>' + (ns.apiVersion || "") + '</td>' +
              '<td><a href="#" class="bc-remove-namespace" data-index="' + index + '">Remove</a></td>' +
            '</tr>'
          );
        }).join("");
        $("#bc-custom-api-list tbody").html(rows || '<tr><td colspan="4"><em>No custom APIs configured</em></td></tr>');
        $("#node-config-input-customApiNamespaces").val(JSON.stringify(namespaces));
      }

      function openAddDialog() {
        var dialogHtml =
          '<div id="bc-custom-api-dialog">' +
            '<div class="form-row"><label>API Publisher</label><input type="text" id="bc-dialog-publisher" /></div>' +
            '<div class="form-row"><label>API Group</label><input type="text" id="bc-dialog-group" /></div>' +
            '<div class="form-row"><label>API Version</label><input type="text" id="bc-dialog-version" placeholder="v1.0" /></div>' +
          '</div>';
        var $dialog = $(dialogHtml).appendTo("body");
        $dialog.dialog({
          modal: true,
          title: "Add Custom API Namespace",
          width: 480,
          buttons: [
            {
              text: "Add",
              click: function () {
                var apiPublisher = $("#bc-dialog-publisher").val().trim();
                var apiGroup = $("#bc-dialog-group").val().trim();
                var apiVersion = $("#bc-dialog-version").val().trim();
                if (!apiPublisher || !apiGroup || !apiVersion) {
                  RED.notify("Publisher, Group and Version are required", "error");
                  return;
                }
                namespaces.push({ apiPublisher: apiPublisher, apiGroup: apiGroup, apiVersion: apiVersion });
                renderNamespaces();
                $(this).dialog("close");
              }
            },
            {
              text: "Cancel",
              click: function () {
                $(this).dialog("close");
              }
            }
          ],
          close: function () {
            $dialog.remove();
          }
        });
      }

      $("#bc-add-custom-api").on("click", function (e) {
        e.preventDefault();
        openAddDialog();
      });
      $("#bc-custom-api-list").on("click", ".bc-remove-namespace", function (e) {
        e.preventDefault();
        var index = Number($(this).attr("data-index"));
        namespaces.splice(index, 1);
        renderNamespaces();
      });
      renderNamespaces();
    },
    oneditsave: function () {
      // hidden field already updated by UI logic
    },
    label: function () {
      return this.name || this.tenantId || "businesscentral-config";
    }
  });
</script>
